name: Tauri v2 Release Process
run-name: triggered by ${{ github.actor }}.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  draft:
    runs-on: ubuntu-22.04
    environment: CrabNebula Cloud

    steps:
      - uses: actions/checkout@v4
      - name: create draft release
        uses: crabnebula-dev/cloud-release@v0
        with:
          command: release draft ${{ vars.CN_APPLICATION }} --framework tauri
          api-key: ${{ secrets.CN_API_KEY }}

  build_desktop:
    needs: draft
    environment: CrabNebula Cloud

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-latest
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.1

      - name: build Tauri app for Windows, Linux
        if: matrix.os != 'macos-latest'
        run: |
          npm ci
          npm exec tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Install x86_64-apple-darwin target for mac and build Tauri binaries
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          npm ci
          npm exec tauri build -- --target x86_64-apple-darwin
          npm exec tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: upload assets
        uses: crabnebula-dev/cloud-release@v0
        with:
          command: release upload ${{ vars.CN_APPLICATION }} --framework tauri
          api-key: ${{ secrets.CN_API_KEY }}

  build_android:
    needs: draft
    environment: CrabNebula Cloud

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          link-to-sdk: true

      - name: install Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      # TODO: Add Android signing
      # - name: setup Android signing
      #   working-directory: src-tauri/gen/android
      #   run: |
      #     echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
      #     echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
      #     base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
      #     echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      # - name: build Tauri app for Android
      #   env:
      #     NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      #   run: |
      #     npm ci
      #     npm run tauri android build

      # - name: upload assets
      #   uses: crabnebula-dev/cloud-release@v0
      #   with:
      #     command: release upload ${{ vars.CN_APPLICATION }} --framework tauri
      #     api-key: ${{ secrets.CN_API_KEY }}

  build_ios:
    needs: draft
    environment: CrabNebula Cloud

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install stable toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: install iOS target
        run: rustup target add aarch64-apple-ios

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # TODO: Add iOS signing
      # - name: setup Apple API key
      #   run: |
      #     APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
      #     echo "${{ secrets.APPLE_API_KEY }}" > $APPLE_API_KEY_PATH
      #     echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> $GITHUB_ENV
      #     echo "API_PRIVATE_KEYS_DIR=$RUNNER_TEMP" >> $GITHUB_ENV

      # - name: build Tauri app for iOS
      #   env:
      #     APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
      #     APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      #     APPLE_DEVELOPMENT_TEAM: <ENTER TEAM HERE>
      #   run: |
      #     npm ci
      #     npm run tauri ios build --export-method app-store-connect

      # - name: upload assets
      #   uses: crabnebula-dev/cloud-release@v0
      #   with:
      #     command: release upload ${{ vars.CN_APPLICATION }} --framework tauri
      #     api-key: ${{ secrets.CN_API_KEY }}

  publish:
    needs: [build_desktop, build_android, build_ios]
    environment: CrabNebula Cloud

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: publish release
        uses: crabnebula-dev/cloud-release@v0
        with:
          command: release publish ${{ vars.CN_APPLICATION }} --framework tauri
          api-key: ${{ secrets.CN_API_KEY }}
